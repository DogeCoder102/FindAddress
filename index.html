<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tra cứu Địa chỉ Hà Nội</title>
  <meta name="description" content="Tra cứu địa chỉ hành chính Hà Nội bằng OpenStreetMap API.">
  <meta name="theme-color" content="#0b0b13">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-base: #0b0b13;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --color-primary: #8b5cf6;
      --color-secondary: #3b82f6;
      --gradient-accent: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      --gradient-surface: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.4) 100%);
      --color-success: #10b981;
      --color-danger: #ef4444;
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.2);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
      animation: float 10s ease-in-out infinite alternate;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      max-width: 400px;
      max-height: 400px;
      background: rgba(139, 92, 246, 0.3);
    }

    .orb-2 {
      top: 40%;
      right: -20%;
      width: 60vw;
      height: 60vw;
      max-width: 500px;
      max-height: 500px;
      background: rgba(59, 130, 246, 0.2);
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
      }

      100% {
        transform: translateY(30px) scale(1.05);
      }
    }

    .container {
      width: 100%;
      max-width: 520px;
      padding: max(env(safe-area-inset-top), 40px) 24px max(env(safe-area-inset-bottom), 40px);
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ===== Header - compact on mobile ===== */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: gap 0.3s;
    }

    .logo-wrapper {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: var(--gradient-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 24px rgba(139, 92, 246, 0.4);
      position: relative;
      transition: width 0.3s, height 0.3s;
    }

    .logo-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3);
    }

    .title-area h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-area .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.4;
      transition: opacity 0.3s, max-height 0.3s;
      overflow: hidden;
    }

    /* ===== Search Component ===== */
    .search-box {
      width: 100%;
      position: relative;
    }

    .search-input-group {
      display: flex;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 6px 6px 6px 20px;
      box-shadow: var(--shadow-soft);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-input-group:focus-within {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .search-icon {
      color: var(--text-muted);
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      transition: color 0.3s, transform 0.3s;
    }

    .search-input-group:focus-within .search-icon {
      color: var(--color-primary);
      transform: scale(1.1);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1.05rem;
      padding: 14px 8px;
      outline: none;
      width: 100%;
      min-width: 0;
    }

    .search-input::placeholder {
      color: rgba(148, 163, 184, 0.6);
      font-weight: 300;
    }

    /* Clear button (✕) inside input */
    .clear-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      padding: 0;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      margin-right: 8px;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: var(--text-main);
    }

    .clear-btn.visible {
      display: flex;
    }

    /* Submit Button with loading state */
    .submit-btn {
      background: var(--gradient-accent);
      color: white;
      border: none;
      border-radius: calc(var(--radius-xl) - 6px);
      padding: 14px 24px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      position: relative;
    }

    .submit-btn:hover {
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }

    .submit-btn:active {
      transform: scale(0.96);
    }

    .submit-btn.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    .submit-btn .btn-text {
      transition: opacity 0.2s;
    }

    .submit-btn .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .submit-btn.loading .btn-text {
      opacity: 0;
      position: absolute;
    }

    .submit-btn.loading .btn-arrow {
      display: none;
    }

    .submit-btn.loading .btn-spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ===== Examples Chips ===== */
    .examples-container {
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    .examples-container.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .example-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-align: center;
    }

    .chips-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .chip {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* ===== Skeleton Loader ===== */
    .skeleton-loader {
      display: none;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      background: var(--gradient-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      animation: pulse 1.5s infinite ease-in-out;
    }

    .skeleton-line {
      height: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    .skeleton-line.w-13 {
      width: 33%;
      height: 12px;
      margin-bottom: 8px;
    }

    .skeleton-line.w-full {
      width: 100%;
      height: 24px;
    }

    .skeleton-line.w-34 {
      width: 75%;
      height: 24px;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* ===== Result Card ===== */
    .result-view {
      display: none;
      background: var(--gradient-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-soft);
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      overflow: hidden;
    }

    .result-view::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-accent);
    }
    
    /* ===== Suggestions Card ===== */
    .suggestions-view {
      display: none;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-soft);
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .suggestions-title {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .suggestions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggestion-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      background: var(--surface-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.2s ease;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .suggestion-btn::before {
      content: '📍';
      font-size: 1.1rem;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .suggestion-btn:hover {
      background: rgba(100, 116, 139, 0.3);
      border-color: rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .result-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--color-success);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: currentColor;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
      animation: dotPulse 2s infinite;
    }

    @keyframes dotPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .address-display {
      font-size: 1.25rem;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-main);
      margin-bottom: 24px;
      word-break: break-word;
    }

    /* Copy Button — prominent style */
    .action-row {
      display: flex;
      gap: 12px;
    }

    .btn-copy {
      flex: 1;
      background: var(--gradient-accent);
      border: none;
      color: white;
      padding: 14px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-copy:hover {
      box-shadow: 0 4px 16px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }

    .btn-copy:active {
      transform: scale(0.97);
    }

    .btn-copy.success {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    /* ===== Error State ===== */
    .error-view {
      display: none;
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      animation: slideUpFade 0.3s ease forwards;
    }

    .error-icon {
      font-size: 32px;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 8px rgba(239, 68, 68, 0.2));
    }

    .error-text {
      color: #fca5a5;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    /* ===== Back Button ===== */
    .btn-back {
      flex: 0 0 auto;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      padding: 14px 20px;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.15);
      color: var(--text-main);
    }
    
    .btn-back svg {
      width: 18px;
      height: 18px;
    }

    /* ===== Utilities ===== */
    .footer {
      text-align: center;
      margin-top: auto;
      padding-top: 16px;
    }

    .footer p {
      color: rgba(148, 163, 184, 0.3);
      font-size: 0.7rem;
    }

    /* ===== Utility ===== */
    .show {
      display: block !important;
    }

    .show-flex {
      display: flex !important;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .submit-btn .btn-text {
        display: none;
      }

      .submit-btn {
        padding: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        justify-content: center;
      }

      .submit-btn .btn-arrow {
        margin-left: 0;
      }

      .clear-btn {
        width: 40px;
        height: 40px;
        margin-right: 4px;
      }
      
      .clear-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Make address break gracefully */
      .action-row {
        flex-direction: column;
      }
      
      .btn-back {
        width: 100%;
      }
      .container {
        gap: 20px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .header {
        gap: 8px;
      }

      .logo-wrapper {
        width: 44px;
        height: 44px;
      }

      .logo-wrapper svg {
        width: 24px;
        height: 24px;
      }

      .title-area h1 {
        font-size: 1.5rem;
        margin-bottom: 2px;
      }

      .title-area .subtitle {
        font-size: 0.8rem;
      }

      .footer {
        display: none;
      }
    }

    @media (max-width: 380px) {
      .search-input-group {
        padding-left: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="container">
    <header class="header">
      <div class="logo-wrapper">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M21 10C21 17 12 23 12 23C12 23 3 17 3 10C3 7.61305 3.94821 5.32387 5.63604 3.63604C7.32387 1.94821 9.61305 1 12 1C14.3869 1 16.6761 1.94821 18.364 3.63604C20.0518 5.32387 21 7.61305 21 10Z"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path
            d="M12 13C13.6569 13 15 11.6569 15 10C15 8.34315 13.6569 7 12 7C10.3431 7 9 8.34315 9 10C9 11.6569 10.3431 13 12 13Z"
            stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div class="title-area">
        <h1>Hanoi Address</h1>
        <p class="subtitle">Tra cứu địa chỉ hành chính Hà Nội</p>
      </div>
    </header>

    <div class="search-box">
      <form id="searchForm" onsubmit="handleSearch(event)">
        <div class="search-input-group">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Nhập địa chỉ, tòa nhà, ngõ..."
            autocomplete="off" />
          <!-- [FIX #8] Clear button -->
          <button type="button" class="clear-btn" id="clearBtn" onclick="clearInput()" aria-label="Xóa">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <button type="submit" class="submit-btn" id="submitBtn">
            <!-- [FIX #6] Loading spinner inside button -->
            <span class="btn-text">Tra cứu</span>
            <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
            <div class="btn-spinner"></div>
          </button>
        </div>
      </form>
    </div>

    <!-- Examples — hidden when result is showing -->
    <div class="examples-container visible" id="examplesBlock">
      <div class="example-label">Có thể bạn đang tìm</div>
      <div class="chips-grid" id="examplesContainer">
        <button class="chip" onclick="applyExample('S201 Vinhomes Smart City')">🏢 S201 Smart City</button>
        <button class="chip" onclick="applyExample('123 Nguyễn Ngọc Nại')">📍 123 Nguyễn Ngọc Nại</button>
        <button class="chip" onclick="applyExample('66 Vương Thừa Vũ')">🛵 66 Vương Thừa Vũ</button>
        <button class="chip" onclick="applyExample('Park 9 Times City')">🏛️ Park 9 Times City</button>
      </div>
    </div>

    <!-- Loading Skeleton -->
    <div class="skeleton-loader" id="loadingState">
      <div class="skeleton-line w-13"></div>
      <div class="skeleton-line w-full"></div>
      <div class="skeleton-line w-34"></div>
    </div>

    <!-- Success Result View -->
    <div class="result-view" id="resultView">
      <div class="result-status">
        <div class="status-dot"></div>
        Trích xuất thành công
      </div>
      <div class="address-display" id="addressResult"></div>
      <div class="action-row">
        <!-- [FIX #5] Copy button now uses gradient accent -->
        <button type="button" class="btn-copy" id="copyBtn" onclick="copyResult()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span id="copyBtnText">Sao chép địa chỉ</span>
        </button>
        <button type="button" class="btn-back" onclick="clearInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Quay lại
        </button>
      </div>
    </div>
    
    <!-- Suggestions View (Disambiguation) -->
    <div class="suggestions-view" id="suggestionsView">
      <div class="suggestions-title">Phát hiện nhiều địa chỉ tương tự.<br>Bạn muốn chọn địa chỉ nào?</div>
      <div class="suggestions-list" id="suggestionsList">
        <!-- JS rendered items -->
      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

Đức", "Trầm Lộng", "Kim Đường", "Đại Hùng", "Đông Lỗ", "Phù Lưu", "Đại Cường", "Bình Lưu Quang", "Đại Nghĩa", "Thượng Lâm", "Tuy Lai", "Phúc Lâm", "Mỹ Xuyên", "An Mỹ", "Hồng Sơn", "Lê Thanh", "Xuy Xá", "Phù Lưu Tế", "Đại Hưng", "Vạn Tín", "Hương Sơn", "Hùng Tiến", "An Tiến", "Hợp Tiến", "Hợp Thanh", "An Phú"];

    const hanoiWardsDb = rawHanoiWards.map(w => ({
      display: w,
      searchKey: normalizeStr(w)
    })).sort((a, b) => b.searchKey.length - a.searchKey.length);

    // Bounding Box Hà Nội (lat/lon) để validate kết quả
    const HANOI_BOUNDS = { latMin: 20.56, latMax: 21.39, lonMin: 105.28, lonMax: 106.05 };

    const els = {
      input: document.getElementById('searchInput'),
      btnSubmit: document.getElementById('submitBtn'),
      btnClear: document.getElementById('clearBtn'),
      loader: document.getElementById('loadingState'),
      resView: document.getElementById('resultView'),
      errView: document.getElementById('errorView'),
      errBody: document.getElementById('errorBody'),
      examples: document.getElementById('examplesBlock'),
      txtAddress: document.getElementById('addressResult'),
      btnCopy: document.getElementById('copyBtn'),
      txtCopy: document.getElementById('copyBtnText'),
      suggestionsView: document.getElementById('suggestionsView'),
      suggestionsList: document.getElementById('suggestionsList'),
      chipsContainer: document.getElementById('examplesContainer')
    };

    // [FIX #8] Show/hide clear button on input
    els.input.addEventListener('input', function () {
      els.btnClear.classList.toggle('visible', this.value.length > 0);
    });

    function clearInput() {
      els.input.value = '';
      els.btnClear.classList.remove('visible');
      els.input.focus();
      resetViews();
      els.examples.classList.add('visible');
    }

    function normalizeStr(str) {
      if (!str) return "";
      return str.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/[^a-z0-9]/g, "");
    }

    function cleanAdmin(name) {
      if (!name) return "";
      return name.replace(/^(phường|quận|xã|thị trấn|huyện|p\.|q\.)\s*/i, '')
        .replace(/\s*(ward|district|commune|town|city)$/i, '')
        .trim();
    }

    function matchWard(dirtyInput) {
      if (!dirtyInput) return "";
      const searchInput = normalizeStr(dirtyInput);
      const match = hanoiWardsDb.find(w => searchInput.includes(w.searchKey));
      if (match) return match.display;
      return cleanAdmin(dirtyInput);
    }

    function formatAddressFromOsm(addressObj) {
      const oldWard = addressObj.suburb || addressObj.quarter || addressObj.village || "";
      return { ward: matchWard(oldWard) };
    }

    function toTitleCase(str) {
      if (!str) return "";
      return str.split(' ').map(word => {
        if (!word) return '';
        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
      }).join(' ');
    }

    // [FIX #1] Kiểm tra kết quả có thuộc Hà Nội không
    function isInHanoi(lat, lon) {
      return lat >= HANOI_BOUNDS.latMin && lat <= HANOI_BOUNDS.latMax &&
        lon >= HANOI_BOUNDS.lonMin && lon <= HANOI_BOUNDS.lonMax;
    }

    function isInHanoiByProps(props) {
      if (props.city && normalizeStr(props.city).includes('hanoi')) return true;
      if (props.state && normalizeStr(props.state).includes('hanoi')) return true;
      return false;
    }

    // [FIX #2] Reset tất cả views triệt để
    function resetViews() {
      els.resView.classList.remove('show');
      els.errView.classList.remove('show');
      els.examples.classList.remove('visible');
      els.loader.classList.remove('show-flex');
      if (els.suggestionsView) els.suggestionsView.style.display = 'none';

      els.btnCopy.classList.remove('success');
      els.txtCopy.innerText = "Sao chép địa chỉ";
      els.btnCopy.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
    }

    // [FIX #6] Toggle loading state on button
    function setLoading(on) {
      els.btnSubmit.classList.toggle('loading', on);
      if (on) {
        els.loader.classList.add('show-flex');
      } else {
        els.loader.classList.remove('show-flex');
      }
    }

    async function handleSearch(e) {
      if (e) e.preventDefault();
      const query = els.input.value.trim();
      if (!query) return;

      // Show clear button
      els.btnClear.classList.add('visible');

      let searchQ = query;
      if (!searchQ.toLowerCase().includes('hà nội') && !searchQ.toLowerCase().includes('hanoi')) {
        searchQ += ' Hà Nội';
      }

      const encodedQuery = encodeURIComponent(searchQ);
      resetViews();
      setLoading(true);

      try {
        // [FIX] Khai báo email để tuân thủ Policy của Nominatim OSM, tránh bị HTTP 403 Block
        const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodedQuery}&format=json&addressdetails=1&limit=3&accept-language=vi&email=hanoilookup@gmail.com`, {
          headers: { 'Accept-Language': 'vi-VN,vi;q=0.9' }
        });
        
        if (!response.ok) throw new Error(`OSM Nominatim API Error: ${response.status}`);
        
        const data = await response.json();

        let results = [];

        if (data && data.length > 0) {
          // Lấy tối đa 3 kết quả nằm trong Hà Nội
          const hanoiItems = data.filter(item => isInHanoi(parseFloat(item.lat), parseFloat(item.lon)));
          
          if (hanoiItems.length > 0) {
             hanoiItems.forEach(item => {
                let addrStr = processLocation(item, query);
                if (addrStr && !results.includes(addrStr)) {
                   results.push(addrStr);
                }
             });
          }
        }

        // Nếu Nominatim không có kết quả hợp lệ, Fallback qua Photon
        if (results.length === 0) {
          const fuzzyRes = await fetch(`https://photon.komoot.io/api/?q=${encodedQuery}&limit=5`);
          if (!fuzzyRes.ok) throw new Error(`Photon API Error: ${fuzzyRes.status}`);
          
          const fuzzyData = await fuzzyRes.json();

          if (fuzzyData && fuzzyData.features && fuzzyData.features.length > 0) {
            const hanoiFeatures = fuzzyData.features.filter(f => {
              const coords = f.geometry?.coordinates;
              const props = f.properties || {};
              if (coords && isInHanoi(coords[1], coords[0])) return true;
              return isInHanoiByProps(props);
            });

            hanoiFeatures.slice(0, 3).forEach(f => {
               let addrStr = processPhotonLocation(f, query);
               if (addrStr && !results.includes(addrStr)) {
                  results.push(addrStr);
               }
            });
          }
        }
        
        setLoading(false);

        if (results.length > 0) {
          handleMultipleResults(results, searchQ);
        } else {
          showError("Không tìm thấy thông tin trên bản đồ.<br>Bạn thử kiểm tra lại chính tả hoặc thêm từ khóa <b>Hà Nội</b>.");
        }
      } catch (err) {
        setLoading(false);
        showError(`Lỗi kết nối hoặc xử lý dữ liệu bản đồ.<br><small style="color:#ff6b6b; font-size: 0.8rem">${err.message}</small>`);
        console.error(err);
      }
    }

    function extractHouseNumber(query) {
      const match = query.match(/^([A-Za-z]*\d+[\w\-\.\/]*)\s*/i);
      return match ? match[1].toUpperCase() : "";
    }

    function cleanRoadName(road) {
      if (!road) return "";
      return road.replace(/^(phố|đường|ngõ|ngách|hẻm)\s+/i, '').trim();
    }

    function isRelevantText(apiText, userQuery) {
      if (!apiText) return false;
      const cleanApi = normalizeStr(apiText);
      const cleanQ = normalizeStr(userQuery);
      return cleanApi.includes(cleanQ) || cleanQ.includes(cleanApi);
    }

    function extractAddressPrefix(rawQuery, props) {
      if (!props) props = {};
      let rawClean = rawQuery.replace(/\b(hà nội|ha noi)\b/gi, '').trim();
      let houseNum = extractHouseNumber(rawClean);
      let queryWithoutHouseNum = rawClean.replace(/^([A-Za-z]*\d+[\w\-\.\/]*)\s*/, '').trim();

      // 1. Nếu là Tòa nhà / Khu đô thị
      if (props.building || props.residential) {
         let parts = [];
         if (props.building && props.building !== 'yes') parts.push(props.building);
         if (props.residential) parts.push(props.residential);
         
         if (parts.length > 0) return parts.join(', ');
      }

      // 2. Lấy Tên Đường nếu API có trả về
      let road = props.road || props.pedestrian || props.street || "";
      let cleanRoad = cleanRoadName(road);
      
      // Kiểm tra an toàn: Tên đường API trả về có khớp với từ khóa người dùng không?
      if (cleanRoad && isRelevantText(cleanRoad, queryWithoutHouseNum)) {
         // Xử lý rơi vãi số nhà trên API (vd: API trả "142 Đường x" -> gỡ "142")
         if (houseNum) cleanRoad = cleanRoad.replace(/^[\d\-\/]+\s+/, '');
         return houseNum ? `${houseNum} ${cleanRoad}` : cleanRoad;
      }

      // 3. Fallback an toàn tuyệt đối: Dùng chuỗi tự nhiên của người dùng gõ
      return toTitleCase(rawClean);
    }

    function processLocation(item, rawQuery) {
      const info = formatAddressFromOsm(item.address);
      let outputAddress = "";

      let prefix = extractAddressPrefix(rawQuery, item.address);
      if (prefix) prefix += ", ";

      if (!info.ward) {
        outputAddress = item.display_name;
      } else {
        outputAddress = `${prefix}phường ${info.ward}, thành phố Hà Nội`;
        outputAddress = outputAddress.replace(/,\s*,/g, ',').replace(/\s+/g, ' ').trim();
      }

      return outputAddress;
    }

    function processPhotonLocation(feature, rawQuery) {
      const props = feature.properties;
      let outputAddress = "";

      let prefix = extractAddressPrefix(rawQuery, props);
      if (prefix) prefix += ", ";

      let rawWard = props.district || props.locality || props.county || props.city || "";
      let ward = matchWard(rawWard);

      if (!ward) {
        let fallbackName = props.name || props.street || props.state || "";
        outputAddress = fallbackName ? `${fallbackName}, thành phố Hà Nội` : `${prefix}thành phố Hà Nội`;
      } else {
        outputAddress = `${prefix}phường ${ward}, thành phố Hà Nội`;
        outputAddress = outputAddress.replace(/,\s*,/g, ',').replace(/\s+/g, ' ').trim();
      }

      return outputAddress;
    }

    // [FIX #3] Xử lý hiển thị nhiều kết quả hoặc gợi ý
    function handleMultipleResults(results, originalQuery) {
      if (results.length === 1) {
        showResult(results[0], originalQuery);
      } else {
        showSuggestions(results, originalQuery);
      }
    }

    function showSuggestions(list, originalQuery) {
      const safeQuery = originalQuery.replace(/'/g, "\\'");
      els.examples.classList.remove('visible');
      els.suggestionsList.innerHTML = list.map(addr => {
        const safeAddr = addr.replace(/'/g, "\\'");
        return `<button class="suggestion-btn" onclick="showResult('${safeAddr}', '${safeQuery}')">${addr}</button>`;
      }).join('');
      els.suggestionsView.style.display = 'block';
    }

    // Ẩn chips khi có kết quả thành công + lưu lịch sử
    function showResult(address, originalQuery) {
      els.txtAddress.innerHTML = address;
      window.currentCopyAddress = address;
      els.examples.classList.remove('visible');
      els.suggestionsView.style.display = 'none';
      els.resView.classList.add('show');

      // Lưu query vào lịch sử tìm kiếm
      if (originalQuery) {
         saveRecentSearch(originalQuery);
         // Ẩn nút X nếu click từ suggestions
         els.btnClear.classList.add('visible'); 
      }
    }

    function showError(msg) {
      els.errBody.innerHTML = msg;
      els.errView.classList.add('show');
      els.examples.classList.add('visible');
    }

    // ==========================================
    // LỊCH SỬ TÌM KIẾM (RECENT SEARCHES)
    // ==========================================
    function loadRecentSearches() {
      let history = localStorage.getItem('recentSearches');
      if (!history) return;
      try {
        let items = JSON.parse(history);
        if (items.length > 0) {
          els.chipsContainer.innerHTML = items.map(q => 
            `<button class="chip" onclick="applyExample('${q.replace(/'/g, "\\'")}')">🕒 ${q}</button>`
          ).join('');
        }
      } catch (e) {}
    }

    window.saveRecentSearch = function(query) {
      if (!query) return;
      let history = localStorage.getItem('recentSearches');
      let items = [];
      if (history) {
        try { items = JSON.parse(history); } catch (e) {}
      }
      
      // Xóa nếu đã tồn tại để đẩy lên đầu
      items = items.filter(i => i.toLowerCase() !== query.toLowerCase());
      items.unshift(query);
      if (items.length > 6) items.pop();
      
      localStorage.setItem('recentSearches', JSON.stringify(items));
      loadRecentSearches();
    }

    window.applyExample = function (text) {
      els.input.value = text;
      els.btnClear.classList.add('visible');
      handleSearch();
    }

    // Load lịch sử ngay khi khởi động
    document.addEventListener('DOMContentLoaded', loadRecentSearches);

    window.copyResult = function () {
      if (!window.currentCopyAddress) return;

      navigator.clipboard.writeText(window.currentCopyAddress).then(() => {
        els.btnCopy.classList.add('success');
        els.txtCopy.innerText = "Đã sao chép!";
        els.btnCopy.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';

        setTimeout(() => {
          els.btnCopy.classList.remove('success');
          els.txtCopy.innerText = "Sao chép địa chỉ";
          els.btnCopy.querySelector('svg').innerHTML = '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>';
        }, 2000);
      });
    }
  </script>
</body>

</html>
